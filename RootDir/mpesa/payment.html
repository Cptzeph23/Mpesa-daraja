{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M-Pesa STK Push — Demo</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { min-height: 100vh; background: #f0f4f0; font-family: 'DM Sans', sans-serif; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .card { background: #fff; border-radius: 20px; width: 100%; max-width: 440px; overflow: hidden; box-shadow: 0 2px 24px rgba(0,0,0,.08); }
    .header { background: #00a651; padding: 2rem 2rem 1.5rem; position: relative; overflow: hidden; }
    .header::before { content: ''; position: absolute; top: -40px; right: -40px; width: 160px; height: 160px; border-radius: 50%; background: rgba(255,255,255,.08); }
    .header::after { content: ''; position: absolute; bottom: -60px; left: -20px; width: 200px; height: 200px; border-radius: 50%; background: rgba(255,255,255,.05); }
    .mpesa-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 1.5rem; position: relative; z-index: 1; }
    .logo-icon { width: 38px; height: 38px; background: #fff; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
    .logo-text { font-family: 'Space Mono', monospace; font-size: 14px; font-weight: 700; color: #fff; letter-spacing: .5px; }
    .logo-sub { font-size: 11px; color: rgba(255,255,255,.7); font-family: 'DM Sans', sans-serif; letter-spacing: 1.5px; text-transform: uppercase; }
    .header h1 { font-size: 22px; font-weight: 500; color: #fff; position: relative; z-index: 1; line-height: 1.3; }
    .header p { font-size: 13px; color: rgba(255,255,255,.75); margin-top: 4px; position: relative; z-index: 1; }
    .body { padding: 2rem; }
    .field { margin-bottom: 1.25rem; }
    label { display: block; font-size: 12px; font-weight: 500; color: #6b7280; letter-spacing: .8px; text-transform: uppercase; margin-bottom: 6px; }
    .input-wrap { position: relative; }
    .prefix { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 14px; color: #9ca3af; font-family: 'Space Mono', monospace; pointer-events: none; }
    input { width: 100%; height: 48px; border: 1.5px solid #e5e7eb; border-radius: 10px; font-size: 15px; font-family: 'DM Sans', sans-serif; color: #111; outline: none; transition: border .15s, box-shadow .15s; background: #fafafa; }
    input:focus { border-color: #00a651; box-shadow: 0 0 0 3px rgba(0,166,81,.12); background: #fff; }
    input.phone-input { padding: 0 14px 0 56px; }
    input.plain { padding: 0 14px; }
    .amount-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 6px; }
    .amount-chip { border: 1.5px solid #e5e7eb; border-radius: 8px; padding: 8px 0; font-size: 13px; font-weight: 500; color: #374151; background: #fff; cursor: pointer; transition: all .15s; text-align: center; font-family: 'DM Sans', sans-serif; }
    .amount-chip:hover { border-color: #00a651; color: #00a651; background: #f0faf4; }
    .amount-chip.active { border-color: #00a651; background: #00a651; color: #fff; }
    .btn { width: 100%; height: 52px; background: #00a651; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; color: #fff; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all .15s; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 0.25rem; }
    .btn:hover { background: #009648; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,150,72,.3); }
    .btn:active { transform: translateY(0); box-shadow: none; }
    .btn:disabled { background: #9ca3af; cursor: not-allowed; transform: none; box-shadow: none; }
    .spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,.4); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status { display: none; margin-top: 1.25rem; border-radius: 10px; padding: 14px 16px; font-size: 13px; line-height: 1.5; }
    .status.success { background: #f0faf4; border: 1.5px solid #bbf7d0; color: #166534; display: block; }
    .status.error { background: #fef2f2; border: 1.5px solid #fecaca; color: #991b1b; display: block; }
    .status-title { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
    .status-id { font-family: 'Space Mono', monospace; font-size: 11px; color: #9ca3af; margin-top: 6px; word-break: break-all; }
    .footer { padding: 0 2rem 1.75rem; text-align: center; }
    .secure { display: flex; align-items: center; justify-content: center; gap: 6px; font-size: 12px; color: #9ca3af; }
  </style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="mpesa-logo">
      <div class="logo-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z" fill="#00a651"/>
        </svg>
      </div>
      <div>
        <div class="logo-text">M-PESA</div>
        <div class="logo-sub">Daraja · Sandbox</div>
      </div>
    </div>
    <h1>STK Push Demo</h1>
    <p>Enter details to trigger a payment prompt</p>
  </div>

  <div class="body">
    <div class="field">
      <label>Phone number</label>
      <div class="input-wrap">
        <span class="prefix">+254</span>
        <input type="tel" class="phone-input" id="phone" placeholder="7XX XXX XXX" maxlength="9">
      </div>
    </div>

    <div class="field">
      <label>Quick amount (KES)</label>
      <div class="amount-grid">
        <button class="amount-chip" onclick="setAmount(10, this)">10</button>
        <button class="amount-chip" onclick="setAmount(50, this)">50</button>
        <button class="amount-chip" onclick="setAmount(100, this)">100</button>
        <button class="amount-chip" onclick="setAmount(250, this)">250</button>
        <button class="amount-chip" onclick="setAmount(500, this)">500</button>
        <button class="amount-chip" onclick="setAmount(1000, this)">1,000</button>
      </div>
    </div>

    <div class="field">
      <label>Or enter amount</label>
      <input type="number" class="plain" id="amount" placeholder="e.g. 150" min="1">
    </div>

    <div class="field">
      <label>Reference</label>
      <input type="text" class="plain" id="reference" placeholder="INV-001" value="DemoRef001">
    </div>

    <button class="btn" id="pay-btn" onclick="submitPayment()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
      Send STK Push
    </button>

    <div class="status" id="status-box">
      <div class="status-title" id="status-title"></div>
      <div id="status-msg"></div>
      <div class="status-id" id="status-id"></div>
    </div>
  </div>

  <div class="footer">
    <div class="secure">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor">
        <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
      </svg>
      Secured via Safaricom Daraja API
    </div>
  </div>
</div>

<script>
  function setAmount(val, el) {
    document.getElementById('amount').value = val;
    document.querySelectorAll('.amount-chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
  }

  document.getElementById('amount').addEventListener('input', () => {
    document.querySelectorAll('.amount-chip').forEach(c => c.classList.remove('active'));
  });

  function getCookie(name) {
    const v = document.cookie.match('(^|;) ?' + name + '=([^;]*)(;|$)');
    return v ? v[2] : '';
  }

  async function submitPayment() {
    const phoneRaw = document.getElementById('phone').value.trim();
    const amount = document.getElementById('amount').value.trim();
    const reference = document.getElementById('reference').value.trim() || 'DemoRef001';
    const btn = document.getElementById('pay-btn');
    const statusBox = document.getElementById('status-box');

    statusBox.className = 'status';

    if (!phoneRaw || phoneRaw.length < 9) {
      return showStatus('error', 'Invalid number', 'Enter a valid 9-digit number (e.g. 712345678)', '');
    }
    if (!amount || parseInt(amount) < 1) {
      return showStatus('error', 'Invalid amount', 'Amount must be at least KES 1', '');
    }

    const phone = '254' + phoneRaw.replace(/^0/, '');

    btn.disabled = true;
    btn.innerHTML = '<div class="spinner"></div> Sending…';

    try {
      const res = await fetch('{% url "mpesa:stk-push" %}', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-CSRFToken': getCookie('csrftoken'),
        },
        body: JSON.stringify({
          phone_number: phone,
          amount: parseInt(amount),
          reference,
          description: 'STK Demo',
        }),
      });

      const data = await res.json();

      if (res.ok) {
        showStatus('success', 'Prompt sent!', 'Check your phone and enter your M-Pesa PIN to complete payment.', data.CheckoutRequestID);
      } else {
        showStatus('error', 'Request failed', data.error || 'Something went wrong. Check your Django logs.', '');
      }
    } catch (e) {
      showStatus('error', 'Network error', 'Could not reach the server. Is Django running?', '');
    } finally {
      btn.disabled = false;
      btn.innerHTML = `
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
        Send STK Push`;
    }
  }

  function showStatus(type, title, msg, id) {
    const box = document.getElementById('status-box');
    document.getElementById('status-title').textContent = title;
    document.getElementById('status-msg').textContent = msg;
    document.getElementById('status-id').textContent = id ? 'Checkout ID: ' + id : '';
    box.className = 'status ' + type;
  }
</script>
</body>
</html>
